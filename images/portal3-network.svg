<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d12"/>
      <stop offset="100%" style="stop-color:#18181f"/>
    </linearGradient>
    <radialGradient id="nodeGlow">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="edge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg3)"/>
  <!-- Edges -->
  <g stroke="url(#edge)" stroke-width="1" fill="none">
    <line x1="200" y1="180" x2="350" y2="120"/><line x1="350" y1="120" x2="500" y2="180"/>
    <line x1="500" y1="180" x2="600" y2="140"/><line x1="350" y1="120" x2="400" y2="260"/>
    <line x1="400" y1="260" x2="300" y2="340"/><line x1="400" y1="260" x2="500" y2="320"/>
    <line x1="200" y1="180" x2="250" y2="280"/><line x1="600" y1="140" x2="550" y2="250"/>
    <line x1="250" y1="280" x2="400" y2="260"/><line x1="550" y1="250" x2="500" y2="320"/>
    <line x1="300" y1="340" x2="400" y2="380"/><line x1="500" y1="320" x2="400" y2="380"/>
  </g>
  <!-- Nodes -->
  <circle cx="200" cy="180" r="14" fill="#1e293b" stroke="#6366f1" stroke-width="2" opacity="0.9"/>
  <circle cx="350" cy="120" r="18" fill="#1e293b" stroke="#818cf8" stroke-width="2" opacity="0.95"/>
  <circle cx="500" cy="180" r="12" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
  <circle cx="600" cy="140" r="10" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <circle cx="400" cy="260" r="20" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <circle cx="300" cy="340" r="11" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <circle cx="500" cy="320" r="11" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
  <circle cx="250" cy="280" r="9" fill="#1e293b" stroke="#818cf8" stroke-width="1"/>
  <circle cx="550" cy="250" r="9" fill="#1e293b" stroke="#818cf8" stroke-width="1"/>
  <circle cx="400" cy="380" r="14" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <!-- Glow -->
  <ellipse cx="400" cy="250" rx="220" ry="120" fill="url(#nodeGlow)"/>
</svg>
